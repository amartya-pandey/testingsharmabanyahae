# Deployment config for Authentication API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-auth
  labels:
    app: api-auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-auth
  template:
    metadata:
      labels:
        app: api-auth
    spec:
      containers:
        - name: api-auth
          image: registry.aiproff.in/platform:v2.1.0
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: "api-auth"
