# Deployment config for Payments API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-payments
  labels:
    app: api-payments
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-payments
  template:
    metadata:
      labels:
        app: api-payments
    spec:
      containers:
        - name: api-payments
          image: registry.aiproff.in/platform:v2.0.0
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: "api-payments"
