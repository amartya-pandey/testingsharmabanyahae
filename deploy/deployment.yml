# Deployment config for User Management API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-users
  labels:
    app: api-users
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-users
  template:
    metadata:
      labels:
        app: api-users
    spec:
      containers:
        - name: api-users
          image: registry.aiproff.in/platform:v2.1.0
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: "api-users"
