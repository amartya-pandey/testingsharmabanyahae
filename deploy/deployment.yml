# Deployment config for Reports API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-reports
  labels:
    app: api-reports
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-reports
  template:
    metadata:
      labels:
        app: api-reports
    spec:
      containers:
        - name: api-reports
          image: registry.aiproff.in/platform:v2.1.0
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: "api-reports"
